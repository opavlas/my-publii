<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUNKCE — pahoclock</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .function-intro {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 56px 40px;
    }
    .function-intro p {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 60ch;
    }
    .function-frame-wrap {
      width: 100%;
      height: calc(100vh - var(--nav-height));
      background: #faf9f5;
    }
    .function-frame-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    @media (max-width: 900px) {
      .function-intro { padding: 16px 28px 24px; }
      .function-frame-wrap { height: 80vh; }
    }
    @media (max-width: 600px) {
      .function-intro { padding: 12px 20px 20px; }
      .function-intro p { font-size: 15px; }
      .function-frame-wrap { height: 30vh; min-height: 200px; max-height: 280px; }
    }
  </style>
</head>
<body data-page="function">

  <nav class="solid" id="main-nav">
    <a href="index.html" class="nav-logo">
      <img src="images/logo_circle_crop.png" alt="pahoclock">
    </a>
    <ul class="nav-links">
      <li><a href="index.html" data-i18n="nav.home">Domů</a></li>
      <li><a href="products.html" data-i18n="nav.products">Produkty</a></li>
      <li><a href="function.html" class="active" data-i18n="nav.function">Funkce</a></li>
      <li><a href="contact.html" data-i18n="nav.contact">Kontakt</a></li>
    </ul>
    <button class="lang-toggle" id="lang-toggle" onclick="toggleLang()">EN</button>
  </nav>

  <main style="padding-top: var(--nav-height);">

    <div class="products-page-header fade-up">
      <h1 data-i18n="function.heading">Funkce</h1>
      <p data-i18n="function.subheading">Jak hodiny zobrazují čas</p>
    </div>

    <div class="function-intro fade-up">
      <p data-i18n="function.desc">Hodiny pahoclock zobrazují čas slovy v pětiminutových intervalech. Vyzkoušejte si níže, jak hodiny vypadají v různých časech.</p>
      <p style="margin-top:12px;color:#b8703a;font-weight:600;letter-spacing:0.1em;">TEST — build v6 (scale transform)</p>
    </div>

    <div class="function-frame-wrap">
      <iframe src="function/czech-word-clock.html" title="Czech Word Clock" loading="lazy"></iframe>
    </div>

  </main>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <span class="footer-logo"><img src="images/logo_circle_crop.png" alt="pahoclock"></span>
        <span>&copy; 2026 pahoclock</span>
        <div class="footer-right">
          <a href="contact.html" style="color: inherit; text-decoration: none;" data-i18n="footer.contact">Kontakt</a>
          <a href="https://www.instagram.com/paho_clock" target="_blank" rel="noopener" class="footer-ig" aria-label="Instagram">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
          </a>
        </div>
      </div>
    </div>
  </footer>

  <script src="js/lang.js"></script>

</body>
</html>
