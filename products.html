<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produkty — pahoclock</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="products">

  <nav class="solid" id="main-nav">
    <a href="index.html" class="nav-logo">
      <img src="images/logo_circle.png" alt="pahoclock">
    </a>
    <ul class="nav-links">
      <li><a href="index.html" data-i18n="nav.home">Domů</a></li>
      <li><a href="products.html" class="active" data-i18n="nav.products">Produkty</a></li>
      <li><a href="contact.html" data-i18n="nav.contact">Kontakt</a></li>
    </ul>
    <button class="lang-toggle" id="lang-toggle" onclick="toggleLang()">EN</button>
  </nav>

  <main class="page">
    <div class="container">
      <div class="page-header">
        <h1 data-i18n="products.heading">Hodiny</h1>
      </div>
    </div>

    <div class="container" style="max-width: 1200px; padding: 0 56px;">
      <div class="products-grid">

        <a href="dark.html" class="product-card">
          <img src="images/pahoclock_dark_main.jpg" alt="pahoclock — Dark">
          <div class="product-card-info">
            <h2>pahoclock &mdash; Dark</h2>
            <p class="price">20 000 Kč</p>
            <span class="link-label" data-i18n="products.view">Zobrazit produkt →</span>
          </div>
        </a>

        <a href="corten.html" class="product-card">
          <img src="images/pahoclock_main.JPEG" alt="pahoclock — Corten">
          <div class="product-card-info">
            <h2>pahoclock &mdash; Corten</h2>
            <p class="price">20 000 Kč</p>
            <span class="link-label" data-i18n="products.view">Zobrazit produkt →</span>
          </div>
        </a>

      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <span class="footer-logo"><img src="images/logo_circle.png" alt="pahoclock"></span>
        <span>&copy; 2026 pahoclock</span>
        <div class="footer-right">
          <a href="contact.html" style="color: inherit; text-decoration: none;" data-i18n="footer.contact">Kontakt</a>
          <a href="https://www.instagram.com/paho_clock" target="_blank" rel="noopener" class="footer-ig" aria-label="Instagram">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
          </a>
        </div>
      </div>
    </div>
  </footer>

  <script src="js/lang.js"></script>

</body>
</html>
