<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pahoclock</title>
  <link rel="canonical" href="https://pahoclock.com/">
  <meta property="og:title" content="pahoclock">
  <meta property="og:site_name" content="pahoclock">
  <meta property="og:url" content="https://pahoclock.com/">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="transparent" id="main-nav">
    <a href="index.html" class="nav-logo">
      <img src="images/logo_circle.png" alt="pahoclock">
    </a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-bg" style="background-image: url('images/pahoclock_dark_main.jpg');"></div>
    <div class="hero-content">
      <p class="hero-eyebrow">Handcrafted timepieces</p>
      <h1>pahoclock</h1>
      <p class="hero-tagline">Time, shaped from steel and fire.</p>
      <a href="products.html" class="btn btn-primary">See Products</a>
    </div>
    <span class="hero-scroll">Scroll</span>
  </section>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <span class="footer-logo"><img src="images/logo_circle.png" alt="pahoclock"></span>
        <span>&copy; 2026 pahoclock</span>
        <a href="contact.html" style="color: inherit; text-decoration: none;">Contact</a>
      </div>
    </div>
  </footer>

  <script>
    const nav = document.getElementById('main-nav');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 40) {
        nav.classList.remove('transparent');
        nav.classList.add('solid');
      } else {
        nav.classList.remove('solid');
        nav.classList.add('transparent');
      }
    });
  </script>

</body>
</html>
