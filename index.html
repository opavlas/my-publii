<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pahoclock</title>
  <link rel="canonical" href="https://pahoclock.com/">
  <meta property="og:title" content="pahoclock">
  <meta property="og:site_name" content="pahoclock">
  <meta property="og:url" content="https://pahoclock.com/">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="index">

  <nav class="transparent" id="main-nav">
    <a href="index.html" class="nav-logo">
      <img src="images/logo_circle_crop.png" alt="pahoclock">
    </a>
    <ul class="nav-links">
      <li><a href="index.html" class="active" data-i18n="nav.home">Domů</a></li>
      <li><a href="products.html" data-i18n="nav.products">Produkty</a></li>
      <li><a href="function.html" data-i18n="nav.function">Funkce</a></li>
      <li><a href="contact.html" data-i18n="nav.contact">Kontakt</a></li>
    </ul>
    <button class="lang-toggle" id="lang-toggle" onclick="toggleLang()">EN</button>
  </nav>

  <section class="hero">
    <div class="hero-bg" style="background-image: url('images/pahoclock_dark_main.jpg');"></div>
    <div class="hero-content">
      <p class="hero-eyebrow" data-i18n="hero.eyebrow">Ručně vyráběné hodiny</p>
      <h1>PAHOCLOCK</h1>
      <a href="products.html" class="btn btn-primary" data-i18n="hero.btn">Zobrazit produkty</a>
    </div>
    <span class="hero-scroll" data-i18n="hero.scroll">Posunout</span>
  </section>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <span class="footer-logo"><img src="images/logo_circle_crop.png" alt="pahoclock"></span>
        <span>&copy; 2026 pahoclock</span>
        <div class="footer-right">
          <a href="contact.html" style="color: inherit; text-decoration: none;" data-i18n="footer.contact">Kontakt</a>
          <a href="https://www.instagram.com/paho_clock" target="_blank" rel="noopener" class="footer-ig" aria-label="Instagram">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
          </a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    const nav = document.getElementById('main-nav');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 40) {
        nav.classList.remove('transparent');
        nav.classList.add('solid');
      } else {
        nav.classList.remove('solid');
        nav.classList.add('transparent');
      }
    });
  </script>
  <script src="js/lang.js"></script>

</body>
</html>
